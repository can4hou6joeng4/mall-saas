name: 功能建议
description: 提一个新功能或改进想法
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢分享想法！请先在 [已有 Issue](https://github.com/can4hou6joeng4/mall-saas/issues?q=is%3Aissue) 中搜一遍避免重复。

  - type: textarea
    id: problem
    attributes:
      label: 要解决什么问题
      description: 你在什么场景下感到痛？现有方案有什么不够？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 设想的解决方案
      description: 你希望项目怎么做？API / UI / CLI 命令长什么样？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有 workaround 或其他实现路径？为什么觉得本方案更好？
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: 主要受影响的层
      multiple: true
      options:
        - 后端 apps/api
        - 前端 apps/admin
        - 前端 apps/store
        - 前端 apps/storefront
        - CI / scripts
        - 部署 / 运维
        - 文档
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 行为准则
      options:
        - label: 我已阅读 [Code of Conduct](https://github.com/can4hou6joeng4/mall-saas/blob/main/CODE_OF_CONDUCT.md)
          required: true

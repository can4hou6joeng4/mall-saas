name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mall
          POSTGRES_PASSWORD: mall
          POSTGRES_DB: mall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mall -d mall"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://mall:mall@localhost:5432/mall?schema=public
      DATABASE_APP_URL: postgresql://mall_app:mall_app@localhost:5432/mall?schema=public
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-must-be-at-least-thirty-two-chars-long
      JWT_TTL_SECONDS: 3600
      NODE_ENV: test
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mall/api exec prisma migrate deploy
      - run: pnpm --filter @mall/api exec prisma generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

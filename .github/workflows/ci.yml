name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # 提前迁移到 Node.js 24 runtime，关闭 actions/checkout@v4 等的 deprecation 警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on scripts/*.sh
        run: |
          set -euo pipefail
          # ubuntu-24.04 自带 shellcheck，无需额外安装
          shellcheck --version | head -1
          shopt -s nullglob
          mapfile -t files < <(find scripts -maxdepth 2 -type f -name '*.sh' | sort)
          [[ "${#files[@]}" -gt 0 ]] || { echo "no scripts/*.sh found"; exit 1; }
          # SC2064: cleanup() trap 在脚本里展开 PSQL_CMD 是有意行为；其他常见 false-positive 用 -e 关闭
          shellcheck -e SC2064,SC2155 "${files[@]}"

  build-test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mall
          POSTGRES_PASSWORD: mall
          POSTGRES_DB: mall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mall -d mall"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://mall:mall@localhost:5432/mall?schema=public
      DATABASE_APP_URL: postgresql://mall_app:mall_app@localhost:5432/mall?schema=public
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-must-be-at-least-thirty-two-chars-long
      JWT_TTL_SECONDS: 3600
      PAYMENT_MOCK_SECRET: ci-mock-payment-secret
      NODE_ENV: test
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mall/api exec prisma migrate deploy
      - run: pnpm --filter @mall/api exec prisma generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  docker-smoke:
    runs-on: ubuntu-24.04
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mall
          POSTGRES_PASSWORD: mall
          POSTGRES_DB: mall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mall -d mall"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations from runner
        env:
          DATABASE_URL: postgresql://mall:mall@localhost:5432/mall?schema=public
        run: pnpm --filter @mall/api exec prisma migrate deploy
      - name: Build API image
        run: docker build -f apps/api/Dockerfile --target runner -t mall-api:ci-smoke .
      - name: Run image + tenant smoke
        env:
          PAYMENT_MOCK_SECRET: ci-smoke-mock-secret-min16
          JWT_SECRET: ci-smoke-jwt-secret-must-be-at-least-thirty-two-chars-long
          PLATFORM_ADMIN_EMAIL: platform@ci-smoke.dev
          PLATFORM_ADMIN_PASSWORD: ci-smoke-admin-pw
        run: |
          set -euo pipefail
          docker run -d --name mall-api-ci --network host \
            -e DATABASE_URL=postgresql://mall:mall@127.0.0.1:5432/mall?schema=public \
            -e DATABASE_APP_URL=postgresql://mall_app:mall_app@127.0.0.1:5432/mall?schema=public \
            -e REDIS_URL=redis://127.0.0.1:6379/0 \
            -e JWT_SECRET="${JWT_SECRET}" \
            -e JWT_TTL_SECONDS=900 \
            -e JWT_REFRESH_TTL_SECONDS=604800 \
            -e PAYMENT_MOCK_SECRET="${PAYMENT_MOCK_SECRET}" \
            -e PLATFORM_ADMIN_EMAIL="${PLATFORM_ADMIN_EMAIL}" \
            -e PLATFORM_ADMIN_PASSWORD="${PLATFORM_ADMIN_PASSWORD}" \
            -e ORDER_TIMEOUT_MS=1800000 \
            -e AUTH_RATE_LIMIT_MAX=200 \
            -e NODE_ENV=production \
            -e LOG_LEVEL=info \
            mall-api:ci-smoke

          # 等 healthz
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/healthz >/dev/null; then break; fi
            if ! docker ps --format '{{.Names}}' | grep -q '^mall-api-ci$'; then
              echo "container exited unexpectedly:"; docker logs mall-api-ci; exit 1
            fi
            sleep 1
            [[ "${i}" == "60" ]] && { echo "timeout waiting for healthz"; docker logs mall-api-ci; exit 1; }
          done

          # 安全头
          curl -sI http://127.0.0.1:3000/healthz | grep -qi 'x-content-type-options: nosniff'

          # /readyz 含 db + redis
          curl -sf http://127.0.0.1:3000/readyz | grep -q '"redis":"ok"'
          curl -sf http://127.0.0.1:3000/readyz | grep -q '"db":"ok"'

          # /metrics
          curl -sf http://127.0.0.1:3000/metrics | grep -q 'http_requests_total'

          # tenant 流程：建租户 + 注册 admin + 创建商品 + 下单 + 验证
          docker exec $(docker ps -q --filter ancestor=postgres:16-alpine) \
            psql -U mall -d mall -c "INSERT INTO \"Tenant\" (id, name) VALUES (9999, 'ci-smoke') ON CONFLICT (id) DO NOTHING;"

          reg=$(curl -sf -X POST http://127.0.0.1:3000/auth/register \
            -H 'content-type: application/json' \
            -d '{"tenantId":9999,"email":"ci@smoke.dev","password":"ci-smoke-pw1!","role":"admin"}')
          access=$(echo "${reg}" | sed -n 's/.*"accessToken":"\([^"]*\)".*/\1/p')
          [[ -n "${access}" ]] || { echo "register failed: ${reg}"; exit 1; }

          prod=$(curl -sf -X POST http://127.0.0.1:3000/products \
            -H "authorization: Bearer ${access}" -H 'content-type: application/json' \
            -d '{"name":"ci-sku","priceCents":1000,"stock":2}')
          pid=$(echo "${prod}" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)

          order=$(curl -sf -X POST http://127.0.0.1:3000/orders \
            -H "authorization: Bearer ${access}" -H 'content-type: application/json' \
            -d "{\"items\":[{\"productId\":${pid},\"quantity\":1}]}")
          oid=$(echo "${order}" | sed -n 's/.*"id":\([0-9]*\).*/\1/p' | head -1)
          echo "${order}" | grep -q '"status":"pending"' || { echo "order not pending: ${order}"; exit 1; }

          # 主动取消 → reservedStock 应释放
          curl -sf -X POST "http://127.0.0.1:3000/orders/${oid}/cancel" \
            -H "authorization: Bearer ${access}" >/dev/null

          echo "✅ CI docker smoke 全部通过"
      - name: Dump container logs on failure
        if: failure()
        run: docker logs mall-api-ci || true

  acceptance-smoke:
    # 跑最近一个验收脚本（M21 端到端：order detail + coupon 生命周期）
    # 通过 PSQL_CMD + SKIP_PIPELINE 旋钮复用 scripts/m21-acceptance.sh，避免与 build-test 重复跑 pipeline
    runs-on: ubuntu-24.04
    needs: build-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mall
          POSTGRES_PASSWORD: mall
          POSTGRES_DB: mall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mall -d mall"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://mall:mall@localhost:5432/mall?schema=public
      DATABASE_APP_URL: postgresql://mall_app:mall_app@localhost:5432/mall?schema=public
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-acceptance-jwt-secret-must-be-at-least-thirty-two-chars
      PAYMENT_MOCK_SECRET: ci-acceptance-mock-secret
      PLATFORM_ADMIN_EMAIL: platform@ci-acceptance.dev
      PLATFORM_ADMIN_PASSWORD: ci-acceptance-pw
      PGPASSWORD: mall
      PSQL_CMD: psql -h 127.0.0.1 -U mall -d mall
      SKIP_PIPELINE: "1"
      HOST_PORT: "3021"
      TENANT_ID: "9921"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: pnpm install --frozen-lockfile
      - name: Run M21 acceptance script (skip pipeline)
        run: bash scripts/m21-acceptance.sh
      - name: Dump container logs on failure
        if: failure()
        run: docker logs mall-api-m21-smoke || true

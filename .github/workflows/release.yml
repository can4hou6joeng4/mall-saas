name: release

# 推 v* tag 时构建并 push 双镜像（mall-api 运行时 + mall-api-migrate 迁移）到 GHCR。
# tag 命名同 git tag（例如 v0.30.0-m30），稳定 tag 不带 -mNN 后缀的额外打 latest。
on:
  push:
    tags:
      - 'v*'
  # 允许手动从 main 触发，指定要 release 的 tag。
  # 用法：gh workflow run release.yml -f tag=v0.34.0-m34
  workflow_dispatch:
    inputs:
      tag:
        description: '已存在的 git tag，例如 v0.34.0-m34'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  push-images:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # push tag 触发：默认 ref；workflow_dispatch 触发：用 inputs.tag
          ref: ${{ inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image refs
        id: meta
        # inputs.tag 经过 env 隔离再用 shell 读，避免直接插值进 run: 引发 command injection
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          api_image="ghcr.io/${owner_lc}/mall-api"
          migrate_image="ghcr.io/${owner_lc}/mall-api-migrate"
          api_tags="${api_image}:${tag},${api_image}:sha-${GITHUB_SHA::12}"
          migrate_tags="${migrate_image}:${tag},${migrate_image}:sha-${GITHUB_SHA::12}"
          # 稳定 tag（vX.Y.Z 无后缀）→ 顺手打 latest
          if [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            api_tags="${api_tags},${api_image}:latest"
            migrate_tags="${migrate_tags},${migrate_image}:latest"
          fi
          {
            echo "api_tags=${api_tags}"
            echo "migrate_tags=${migrate_tags}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build & push api image (target=runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push migrate image (target=migrate)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: migrate
          push: true
          tags: ${{ steps.meta.outputs.migrate_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

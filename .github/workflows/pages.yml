name: pages

# 每次后端 OpenAPI 规约更新时重建 Swagger UI 静态站点，发布到 GitHub Pages。
# 出口：https://can4hou6joeng4.github.io/mall-saas/
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/openapi.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build static Swagger UI site
        run: |
          set -euo pipefail
          mkdir -p site
          cp apps/api/openapi.json site/openapi.json
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>mall-saas API · Swagger UI</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
            <style>
              body { margin: 0; }
              .topbar {
                background: #1a2236; color: #fff; padding: 12px 20px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                display: flex; justify-content: space-between; align-items: center;
                flex-wrap: wrap; gap: 8px;
              }
              .topbar a { color: #8ab4f8; text-decoration: none; margin-left: 12px; }
              .topbar a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <div class="topbar">
              <strong>mall-saas API</strong>
              <span>
                <a href="https://github.com/can4hou6joeng4/mall-saas">GitHub</a>
                <a href="https://github.com/can4hou6joeng4/mall-saas/releases">Releases</a>
                <a href="https://github.com/can4hou6joeng4/mall-saas/blob/main/CHANGELOG.md">Changelog</a>
                <a href="https://github.com/can4hou6joeng4/mall-saas/blob/main/ROADMAP.md">Roadmap</a>
              </span>
            </div>
            <div id="swagger-ui"></div>
            <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
            <script>
              window.onload = function () {
                window.ui = SwaggerUIBundle({
                  url: './openapi.json',
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [SwaggerUIBundle.presets.apis],
                  layout: 'BaseLayout',
                });
              };
            </script>
          </body>
          </html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

services:
  postgres:
    image: postgres:16-alpine
    container_name: mall-postgres
    environment:
      POSTGRES_USER: mall
      POSTGRES_PASSWORD: mall
      POSTGRES_DB: mall
    ports:
      - "5432:5432"
    volumes:
      - mall_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mall -d mall"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    ports:
      - "6379:6379"
    volumes:
      - mall_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mall_pg_data:
  mall_redis_data:
